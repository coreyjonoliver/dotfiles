name: Setup chezmoi (Windows)
description: Install chezmoi, create test config, and apply dotfiles on Windows

inputs:
  source:
    description: "Chezmoi source directory"
    required: false
    default: ${{ github.workspace }}
  exclude:
    description: "Chezmoi --exclude flag"
    required: false
    default: "scripts"

runs:
  using: composite
  steps:
    - name: Install chezmoi
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://get.chezmoi.io/ps1" -OutFile install.ps1
        & .\install.ps1 -b "$env:USERPROFILE\.local\bin"
        echo "$env:USERPROFILE\.local\bin" | Out-File -Append $env:GITHUB_PATH

    - name: Create test config
      shell: pwsh
      run: |
        $configDir = Join-Path $env:USERPROFILE ".config\chezmoi"
        New-Item -ItemType Directory -Path $configDir -Force | Out-Null
        @"
        [data]
            name = "Test User"
            email = "test@example.com"
            github_username = "testuser"
            personal = true
            use_1password = false

        [data.roles]
            ai = true
            developer = false
            gaming = false
        "@ | Set-Content -Path (Join-Path $configDir "chezmoi.toml") -Encoding UTF8

    - name: Apply dotfiles
      shell: pwsh
      run: chezmoi apply --source "${{ inputs.source }}" --exclude=${{ inputs.exclude }}
