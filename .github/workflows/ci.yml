name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-shell:
    name: Lint (Shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: bash scripts/lint.sh

  smoke-test:
    name: Smoke Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsSL https://get.chezmoi.io)" -- -b /usr/local/bin

      - name: Create test config
        run: |
          mkdir -p "${HOME}/.config/chezmoi"
          cat > "${HOME}/.config/chezmoi/chezmoi.toml" << 'EOF'
          [data]
              name = "Test User"
              email = "test@example.com"
              github_username = "testuser"
              personal = true
              use_1password = false
          EOF

      - name: Apply dotfiles (dry run)
        run: chezmoi apply --source "${GITHUB_WORKSPACE}" --exclude=scripts --dry-run --verbose

      - name: Apply dotfiles
        run: chezmoi apply --source "${GITHUB_WORKSPACE}" --exclude=scripts

      - name: Verify .zshrc exists
        run: test -f "${HOME}/.zshrc"

      - name: Verify .zprofile exists
        run: test -f "${HOME}/.zprofile"

      - name: Verify git config exists
        run: test -f "${HOME}/.config/git/config"

      - name: Verify git ignore exists
        run: test -f "${HOME}/.config/git/ignore"

      - name: Verify starship config exists
        run: test -f "${HOME}/.config/starship.toml"

      - name: Verify nvim config exists
        run: test -f "${HOME}/.config/nvim/init.lua"

      - name: Verify zshrc syntax
        run: zsh -n "${HOME}/.zshrc"

      - name: Verify git config contains user name
        run: grep -q "Test User" "${HOME}/.config/git/config"

  lint-powershell:
    name: Lint (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell scripts
        shell: pwsh
        run: .\scripts\lint.ps1

  smoke-test-windows:
    name: Smoke Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://get.chezmoi.io/ps1" -OutFile install.ps1
          & .\install.ps1 -b "$env:USERPROFILE\.local\bin"
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append $env:GITHUB_PATH

      - name: Create test config
        shell: pwsh
        run: |
          $configDir = Join-Path $env:USERPROFILE ".config\chezmoi"
          New-Item -ItemType Directory -Path $configDir -Force | Out-Null
          @"
          [data]
              name = "Test User"
              email = "test@example.com"
              github_username = "testuser"
              personal = true
              use_1password = false

          [data.roles]
              ai = true
              developer = false
              gaming = false
          "@ | Set-Content -Path (Join-Path $configDir "chezmoi.toml") -Encoding UTF8

      - name: Apply dotfiles (dry run)
        shell: pwsh
        run: chezmoi apply --source "$env:GITHUB_WORKSPACE" --exclude=scripts --dry-run --verbose

      - name: Apply dotfiles (exclude scripts)
        shell: pwsh
        run: chezmoi apply --source "$env:GITHUB_WORKSPACE" --exclude=scripts

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/windows"
          $config.Output.Verbosity = "Detailed"
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
