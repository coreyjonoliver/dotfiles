name: Snippet install

on:
  schedule:
    - cron: "0 0 * * 5"  # Every Friday
  workflow_dispatch:       # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snippet-install:
    name: Snippet Install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install and apply dotfiles (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply coreyjonoliver \
            --promptBool "use_1password=false" \
            --exclude=scripts

      - name: Install and apply dotfiles (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Install chezmoi
          Invoke-WebRequest -Uri "https://get.chezmoi.io/ps1" -OutFile install.ps1
          & .\install.ps1 -b "$env:USERPROFILE\.local\bin"
          $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"

          # Create config to avoid interactive prompts
          $configDir = Join-Path $env:USERPROFILE ".config\chezmoi"
          New-Item -ItemType Directory -Path $configDir -Force | Out-Null
          @"
          [data]
              name = "Test User"
              email = "test@example.com"
              github_username = "testuser"
              personal = true
              use_1password = false

          [data.roles]
              ai = false
              developer = false
              gaming = false
          "@ | Set-Content -Path (Join-Path $configDir "chezmoi.toml") -Encoding UTF8

          # Init and apply (exclude scripts to avoid installs on runner)
          chezmoi init coreyjonoliver --apply --exclude=scripts

      - name: Verify dotfiles applied (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Checking key dotfiles..."
          test -f "$HOME/.zshrc"
          test -f "$HOME/.zprofile"
          test -f "$HOME/.config/git/config"
          test -f "$HOME/.config/starship.toml"
          test -f "$HOME/.config/nvim/init.lua"
          echo "✓ All key dotfiles present"

      - name: Verify dotfiles applied (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Checking key dotfiles..."
          $checks = @(
              (Join-Path $env:USERPROFILE ".config\git\config"),
              (Join-Path $env:USERPROFILE ".config\starship.toml"),
              (Join-Path $env:USERPROFILE ".config\nvim\init.lua"),
              (Join-Path $env:USERPROFILE "Documents\PowerShell\Microsoft.PowerShell_profile.ps1")
          )
          foreach ($path in $checks) {
              if (-not (Test-Path $path)) {
                  Write-Error "Missing: $path"
                  exit 1
              }
              Write-Host "    ✓ $path"
          }
          Write-Host "✓ All key dotfiles present"
