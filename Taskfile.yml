version: '3'

vars:
  CHEZMOI_SOURCE: '{{.ROOT_DIR}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Cross-platform (chezmoi) ───────────────────────────────────────────────

  install:
    desc: Initialize and apply dotfiles from local source
    cmds:
      - chezmoi init --apply --source {{.CHEZMOI_SOURCE}}

  apply:
    desc: Apply dotfiles changes
    cmds:
      - chezmoi apply --source {{.CHEZMOI_SOURCE}}

  diff:
    desc: Show pending changes
    cmds:
      - chezmoi diff --source {{.CHEZMOI_SOURCE}}

  status:
    desc: Show dotfiles status
    cmds:
      - chezmoi status --source {{.CHEZMOI_SOURCE}}

  edit:
    desc: Edit a managed file (usage -- task edit -- ~/.zshrc)
    cmds:
      - chezmoi edit --source {{.CHEZMOI_SOURCE}} {{.CLI_ARGS}}

  data:
    desc: Show template data
    cmds:
      - chezmoi data --source {{.CHEZMOI_SOURCE}}

  doctor:
    desc: Validate chezmoi environment
    cmds:
      - chezmoi doctor

  update:
    desc: Pull latest changes and apply
    cmds:
      - chezmoi update --source {{.CHEZMOI_SOURCE}}

  clean:
    desc: Remove chezmoi state (keeps applied dotfiles)
    cmds:
      - chezmoi purge --force

  # ── macOS ──────────────────────────────────────────────────────────────────

  brew:
    desc: Install Homebrew packages from Brewfile
    platforms: [darwin]
    cmds:
      - brew bundle --file="${HOME}/.config/homebrew/Brewfile"

  defaults:
    desc: Apply macOS system defaults
    platforms: [darwin]
    cmds:
      - bash home/.chezmoiscripts/darwin/run_onchange_after_configure-defaults.sh

  lint-shell:
    desc: Lint shell scripts with ShellCheck
    platforms: [darwin, linux]
    cmds:
      - bash scripts/lint.sh

  test-shell:
    desc: Run Bats test suite
    platforms: [darwin, linux]
    cmds:
      - bats tests/

  benchmark-shell:
    desc: Benchmark zsh startup time (requires hyperfine)
    platforms: [darwin, linux]
    cmds:
      - bash scripts/run_benchmark.sh

  ci-macos:
    desc: Run full macOS CI pipeline locally (lint + test)
    platforms: [darwin]
    cmds:
      - task: lint-shell
      - task: test-shell

  # ── Windows ────────────────────────────────────────────────────────────────

  lint-powershell:
    desc: Lint PowerShell scripts with PSScriptAnalyzer
    platforms: [windows]
    cmds:
      - pwsh -File scripts/lint.ps1

  test-windows:
    desc: Run Pester tests for Windows
    platforms: [windows]
    cmds:
      - pwsh -Command "Invoke-Pester -Path tests/windows -Output Detailed"

  benchmark-windows:
    desc: Benchmark PowerShell startup time (requires hyperfine)
    platforms: [windows]
    cmds:
      - pwsh -File scripts/run_benchmark.ps1

  ci-windows:
    desc: Run full Windows CI pipeline locally (lint + test)
    platforms: [windows]
    cmds:
      - task: lint-powershell
      - task: test-windows
