# brave-private domain allowlist
# One domain per line. Lines starting with # are ignored.
#
# Add domains here to make them accessible in the Private profile.
# Everything else is blocked by default.
#
# Format:
#   proton.me              — matches proton.me and all subdomains
#   mail.proton.me         — matches only mail.proton.me
#
# Changes take effect next time you run brave-private.

# ── Proton services ──────────────────────────────────────────────────────────
proton.me
protonmail.com
protonmail.ch

# ── Proton infrastructure (API, CDN, captcha, account recovery) ──────────────
proton.ch
proton-api.com

# ── IP / DNS leak verification (optional — remove after initial setup) ───────
ipleak.net

# ── Chrome Web Store (required for 1Password extension install) ──────────────
# After installing 1Password, you can remove these if you prefer.
# The extension persists in user-data once installed.
chromewebstore.google.com
clients2.google.com
chrome.google.com
